# Parametres FlexFoil par defaut
# Format : CLE=VALEUR (pas d'espaces autour du =)
# Les lignes commencant par # sont des commentaires
#
# FlexFoil (https://foil.flexcompute.com) est une reimplementation Rust
# (licence MIT) du solveur XFoil de Mark Drela, appelee en bibliotheque
# Python (pip install flexfoil). Les parametres ci-dessous sont alignes
# sur ceux de defaults_xfoil.cfg pour une parite de comportement.

# --- Conditions aerodynamiques ---
RE=1000000
MACH=0.0

# --- Balayage en angle d'attaque ---
ALPHA_MIN=-5.0
ALPHA_MAX=15.0
ALPHA_STEP=0.5

# --- Mode de calcul ---
# VISCOUS : True pour mode visqueux (avec Re), False pour non visqueux
VISCOUS=True

# --- Parametres solveur ---
# NCRIT : critere de transition e^N (9=soufflerie propre, 5=vol libre)
NCRIT=9
# ITER : nombre max d'iterations de Newton par point
ITER=100
# XTR_TOP : position de transition forcee extrados (0.0=BA, 1.0=BF/libre)
#   Mappe sur xstrip_upper de FlexFoil (meme convention que XFoil).
#   Aligne sur defaults_xfoil.cfg pour une parite de comportement.
XTR_TOP=0.2
# XTR_BOT : position de transition forcee intrados (1.0=libre)
XTR_BOT=0.2

# --- Repaneling ---
# REPANEL : True pour laisser FlexFoil re-paneler le profil
#   (algorithme de paneling base sur la courbure, identique a XFoil PANE)
REPANEL=True
# NPANEL : nombre de panneaux pour le repaneling
NPANEL=200

# --- Cp non visqueux ---
# INVISCID_CP : True pour calculer aussi le Cp non visqueux (par alpha)
INVISCID_CP=True

# --- Execution ---
# TIMEOUT : timeout global en secondes (le calcul natif est rapide)
TIMEOUT=60
